<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 280" role="img" aria-labelledby="title desc">
  <title id="title">Barberflow — visăo de arquitetura</title>
  <desc id="desc">Cliente HTTP, API Spring Boot, PostgreSQL e RabbitMQ</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="920" height="280" fill="url(#bg)" rx="12"/>

  <g filter="url(#shadow)">
    <rect x="40" y="90" width="140" height="100" rx="10" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
    <text x="110" y="130" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#0f172a">Cliente</text>
    <text x="110" y="155" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#475569">HTTP / JSON</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="70" width="220" height="140" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="370" y="108" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">Barberflow API</text>
    <text x="370" y="132" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#475569">Spring Boot · Security · JWT</text>
    <text x="370" y="158" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#475569">JPA · Serviços REST</text>
    <text x="370" y="184" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="12" fill="#475569">Eventos ? RabbitMQ</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="40" width="150" height="90" rx="10" fill="#ffffff" stroke="#0f766e" stroke-width="1.5"/>
    <text x="635" y="78" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#134e4a">PostgreSQL</text>
    <text x="635" y="100" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#475569">persistęncia</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="560" y="155" width="150" height="90" rx="10" fill="#ffffff" stroke="#c2410c" stroke-width="1.5"/>
    <text x="635" y="193" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#9a3412">RabbitMQ</text>
    <text x="635" y="215" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#475569">filas / eventos</text>
  </g>

  <path d="M 182 140 L 248 140" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 482 115 L 548 85" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 482 165 L 548 195" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
