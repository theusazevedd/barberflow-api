services:

  postgres:
    image: postgres:16
    container_name: barberflow-postgres

    environment:
      POSTGRES_DB: barberflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: barberflow-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build: .
    container_name: barberflow-api

    depends_on:
      - postgres
      - rabbitmq

    ports:
      - "8080:8080"

    environment:
      SPRING_PROFILES_ACTIVE: dev

      JWT_SECRET: your-secret-super-secure-key-that-must-be-very-long

      DB_URL: jdbc:postgresql://postgres:5432/barberflow
      DB_USERNAME: postgres
      DB_PASSWORD: 123456

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest

volumes:
  postgres_data: